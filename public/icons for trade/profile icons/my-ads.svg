<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Asset: My Ads Icon (V4 - Premium Listing Style) -->
  <g transform="translate(14, 14)">
    
    <!-- Background Card Frame -->
    <rect x="0" y="0" width="36" height="36" rx="6" fill="#071a2e" stroke="#00e5a0" stroke-width="2">
       <animate attributeName="stroke-opacity" values="0.4; 1; 0.4" dur="4s" repeatCount="indefinite" />
    </rect>

    <!-- Liquid List Lines -->
    <g stroke="#00e5a0" stroke-linecap="round">
      <line x1="8" y1="10" x2="28" y2="10" stroke-width="3">
         <animate attributeName="stroke-opacity" values="0.3; 1; 0.3" dur="3s" repeatCount="indefinite" />
      </line>
      <line x1="8" y1="18" x2="24" y2="18" stroke-width="3" opacity="0.6">
         <animate attributeName="stroke-opacity" values="0.3; 1; 0.3" dur="3s" begin="0.5s" repeatCount="indefinite" />
      </line>
      <line x1="8" y1="26" x2="20" y2="26" stroke-width="3" opacity="0.4">
         <animate attributeName="stroke-opacity" values="0.3; 1; 0.3" dur="3s" begin="1s" repeatCount="indefinite" />
      </line>
    </g>

    <!-- Small 'Ad' Tag Badge -->
    <g transform="translate(30, 4)">
      <circle r="8" fill="#f0b90b" opacity="0.1">
         <animate attributeName="opacity" values="0.1; 0.3; 0.1" dur="2s" repeatCount="indefinite" />
      </circle>
      <path d="M-4 -4 L4 4 M4 -4 L-4 4" stroke="#f0b90b" stroke-width="1.5" opacity="0.8">
         <animateTransform attributeName="transform" type="rotate" values="0; 180; 360" dur="10s" repeatCount="indefinite" />
      </path>
    </g>

    <!-- Global Floating -->
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -1; 0 0" dur="4s" repeatCount="indefinite" additive="sum" />
  </g>
</svg>
