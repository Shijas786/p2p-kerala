<svg width="64" height="64" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- The "Cool" Profile - Reverted Shape with Sunglasses Animation -->
  <g fill="none" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Default Silhouette Base -->
    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" opacity="0.9" />
    <circle cx="12" cy="7" r="4" opacity="0.9" />

    <!-- Animated "Cooling Glasses" -->
    <g>
      <!-- Glasses sliding down from the forehead -->
      <g transform="translate(0, -6)">
        <path d="M10 7 L14 7" stroke="#00e5a0" stroke-width="1.5" /> 
        <rect x="9" y="7.5" width="2.5" height="1.5" rx="0.5" fill="#00e5a0" stroke="none" />
        <rect x="12.5" y="7.5" width="2.5" height="1.5" rx="0.5" fill="#00e5a0" stroke="none" />
        
        <animateTransform 
            attributeName="transform" 
            type="translate" 
            values="0 -6; 0 0; 0 0; 0 -6" 
            keyTimes="0; 0.2; 0.8; 1"
            dur="4s" 
            repeatCount="indefinite" />
            
        <!-- Glint on the shades -->
        <rect x="9.5" y="7.8" width="1" height="0.5" fill="#ffffff" opacity="0.6">
           <animate attributeName="opacity" values="0; 0.6; 0" dur="4s" repeatCount="indefinite" />
        </rect>
      </g>
    </g>

    <!-- Rhythmic floating for the whole icon -->
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -0.5; 0 0" dur="4s" repeatCount="indefinite" additive="sum" />
  </g>
</svg>
