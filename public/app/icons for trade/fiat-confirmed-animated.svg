<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Asset 4: Fiat Confirmed Animated (EMERALD VERSION) -->
  <g fill="none" stroke="#0ecb81" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="translate(10, 10)">
    
    <!-- Bank Building Silhouette -->
    <path d="M4 40 L40 40 M4 40 L4 22 L22 6 L40 22 L40 40 M10 40 L10 26 M16 40 L16 26 M28 40 L28 26 M34 40 L34 26" />
    <path d="M2 44 H42" />

    <!-- Confirmation Double Tick -->
    <g transform="translate(14, 15)">
       <path d="M0 8 L6 14 L18 2" stroke-dasharray="30" stroke-dashoffset="30">
          <animate attributeName="stroke-dashoffset" values="30; 0" dur="0.6s" fill="freeze" />
       </path>
       <path d="M4 14 L10 20 L22 8" stroke-dasharray="30" stroke-dashoffset="30" opacity="0.6">
          <animate attributeName="stroke-dashoffset" values="30; 0" dur="0.6s" begin="0.3s" fill="freeze" />
       </path>
    </g>

    <!-- Success Radiation Wave -->
    <circle cx="22" cy="22" r="1" opacity="0">
       <animate attributeName="r" values="1; 30" dur="2s" repeatCount="indefinite" />
       <animate attributeName="opacity" values="0.6; 0" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- Global Floating -->
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -1; 0 0" dur="4s" repeatCount="indefinite" additive="sum" />
  </g>
</svg>
