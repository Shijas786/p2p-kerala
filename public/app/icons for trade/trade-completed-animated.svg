<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Premium Clinical Success (V4 - Focus on Liquid Flow) -->
  <g transform="translate(10, 10)">
    
    <!-- Outer Liquid Ripple -->
    <circle cx="50" cy="50" r="45" fill="none" stroke="#0ecb81" stroke-width="2" opacity="0">
      <animate attributeName="r" values="30; 50" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6; 0" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Background Glow -->
    <circle cx="50" cy="50" r="35" fill="rgba(14, 203, 129, 0.05)" />

    <!-- Main Liquid Track Ring -->
    <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4" />
    <circle cx="50" cy="50" r="38" fill="none" stroke="#0ecb81" stroke-width="4" stroke-dasharray="240" stroke-dashoffset="240">
       <animate attributeName="stroke-dashoffset" values="240; 0" dur="1s" fill="freeze" />
    </circle>

    <!-- Successful Checkmark -->
    <path d="M35 50 L45 60 L65 40" fill="none" stroke="#0ecb81" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="60" stroke-dashoffset="60">
      <animate attributeName="stroke-dashoffset" values="60; 0" dur="0.5s" begin="0.8s" fill="freeze" />
      <animate attributeName="stroke" values="#0ecb81; #fff; #0ecb81" dur="2s" begin="1.2s" repeatCount="indefinite" />
    </path>

    <!-- Floating Particles (Liquid style) -->
    <circle cx="20" cy="30" r="2" fill="#0ecb81">
      <animate attributeName="cy" values="30; 25; 30" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3; 0.8; 0.3" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="80" cy="40" r="3" fill="#0ecb81">
      <animate attributeName="cy" values="40; 45; 40" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3; 0.8; 0.3" dur="4s" repeatCount="indefinite" />
    </circle>

    <!-- Global Floating Movement -->
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -2; 0 0" dur="4s" repeatCount="indefinite" additive="sum" />
  </g>
</svg>
