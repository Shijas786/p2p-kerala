<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Asset 2: Escrow Locked Animated (BLUE VERSION) -->
  <g fill="none" stroke="#00d2ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="translate(12, 10)">
    
    <!-- Shield Symbol -->
    <path d="M20 44 C10 40 4 30 4 18 L20 4 L36 18 C36 30 30 40 20 44 Z">
      <animate attributeName="stroke-width" values="3; 4; 3" dur="3s" repeatCount="indefinite" />
    </path>
    
    <!-- Central Verification Check -->
    <path d="M12 24 L18 30 L28 16" opacity="0.8">
       <animate attributeName="opacity" values="0.4; 1; 0.4" dur="2s" repeatCount="indefinite" />
    </path>

    <!-- Rotating Security Guard Ring -->
    <circle cx="20" cy="24" r="24" stroke-width="1" stroke-dasharray="10 20" opacity="0.4">
       <animateTransform attributeName="transform" type="rotate" from="0 20 24" to="360 20 24" dur="8s" repeatCount="indefinite" />
    </circle>

    <!-- Global Floating -->
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -1; 0 0" dur="4s" repeatCount="indefinite" additive="sum" />
  </g>
</svg>
