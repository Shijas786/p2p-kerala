<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Asset 3: Fiat Sent Animated (V9 - The Glowing Master INR Coin) -->
  <g transform="translate(12, 12)">
    
    <!-- Outer Liquid Aura -->
    <circle cx="20" cy="20" r="18" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.3">
       <animate attributeName="r" values="18; 24" dur="2s" repeatCount="indefinite" />
       <animate attributeName="opacity" values="0.3; 0" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- Main Digital Coin -->
    <circle cx="20" cy="20" r="16" fill="#1e2329" stroke="#00e5ff" stroke-width="2.5">
       <animate attributeName="stroke" values="#00e5ff; #fff; #00e5ff" dur="3s" repeatCount="indefinite" />
    </circle>

    <!-- PERFECT INR Character (Native Rendering) -->
    <text x="20" y="27" font-family="Arial, system-ui, sans-serif" font-size="18" font-weight="900" fill="#00e5ff" text-anchor="middle">
      ₹
      <animate attributeName="fill" values="#00e5ff; #58ffc6; #00e5ff" dur="3s" repeatCount="indefinite" />
    </text>

    <!-- Speed/Sent Lines (Visualizing 'Sent' motion) -->
    <g stroke="#00e5ff" stroke-width="2" opacity="0.6">
       <!-- Top speed line -->
       <line x1="38" y1="10" x2="48" y2="10">
          <animate attributeName="x1" values="38; 58" dur="1s" repeatCount="indefinite" />
          <animate attributeName="x2" values="48; 68" dur="1s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.6; 0" dur="1s" repeatCount="indefinite" />
       </line>
       <!-- Bottom speed line -->
       <line x1="38" y1="30" x2="48" y2="30">
          <animate attributeName="x1" values="38; 58" dur="1s" begin="0.2s" repeatCount="indefinite" />
          <animate attributeName="x2" values="48; 68" dur="1s" begin="0.2s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.6; 0" dur="1s" begin="0.2s" repeatCount="indefinite" />
       </line>
    </g>

    <!-- Global Floating -->
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -2; 0 0" dur="4s" repeatCount="indefinite" additive="sum" />
  </g>
</svg>
