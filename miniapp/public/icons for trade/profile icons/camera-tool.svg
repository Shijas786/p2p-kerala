<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Animated Camera Tool Button Badge -->
  <g transform="translate(4,4)">
    <!-- Base Circle with Liquid Pulse -->
    <circle cx="16" cy="16" r="16" fill="#1e2329" stroke="#f0b90b" stroke-width="1.5">
       <animate attributeName="stroke-width" values="1.5; 2.5; 1.5" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- Camera Icon -->
    <g transform="translate(6, 8)" fill="none" stroke="#f0b90b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 16a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3l2-3h6l2 3h3a2 2 0 0 1 2 2z"/>
      <circle cx="10" cy="9" r="4">
         <animate attributeName="r" values="3.5; 4.5; 3.5" dur="3s" repeatCount="indefinite" />
      </circle>
      <line x1="16" y1="5" x2="16.01" y2="5" />
    </g>

    <!-- Success Shine -->
    <circle cx="26" cy="6" r="1.5" fill="#fff" opacity="0.6">
       <animate attributeName="opacity" values="0.2; 1; 0.2" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
