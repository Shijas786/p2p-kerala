<svg width="64" height="64" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Cool Animated Orders Icon (Bold Default Style) -->
  <g fill="none" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Clipboard Frame -->
    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
    <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />

    <!-- Animated List Items (Checking off the list) -->
    <g>
      <line x1="8" y1="10" x2="16" y2="10" opacity="0.3">
        <animate attributeName="opacity" values="0.3; 1; 0.3" dur="3s" repeatCount="indefinite" />
      </line>
      <line x1="8" y1="14" x2="14" y2="14" opacity="0.3">
        <animate attributeName="opacity" values="0.3; 1; 0.3" dur="3s" repeatCount="indefinite" begin="1s" />
      </line>
      <line x1="8" y1="18" x2="12" y2="18" opacity="0.3">
        <animate attributeName="opacity" values="0.3; 1; 0.3" dur="3s" repeatCount="indefinite" begin="2s" />
      </line>
    </g>

    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -0.5; 0 0" dur="4s" repeatCount="indefinite" />
  </g>
</svg>
